<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Localizador Kilómétrico · Trenes Argentinos Cargas</title>
<style>
:root{--blue:#1a4fa0;--blue2:#2563c4;--sky:#f5c842;--dark:#09090e;--panel:#111118;--card:#18182a;--border:#22263a;--text:#e8e8f0;--muted:#5a6a8a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Calibri','Carlito',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
header{padding:24px 24px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0e0f18,#090910)}
.hi{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:22px}
.hl{height:80px;width:auto;object-fit:contain;flex-shrink:0}
.ht{flex:1}
.h1{font-size:clamp(16px,3.5vw,22px);font-weight:700;color:#fff;line-height:1.2}
.h1 span{color:#f5c842}
.h2{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:5px}
.hs{display:flex;gap:18px;flex-shrink:0}
.sn{font-size:22px;font-weight:700;color:#f5c842;line-height:1}
.sl{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
@media(max-width:520px){.hs{display:none}}
.tl{height:4px;background:repeating-linear-gradient(90deg,#f5c842 0,#f5c842 14px,var(--blue) 14px,var(--blue) 28px,transparent 28px,transparent 36px);opacity:.7}
main{max-width:760px;margin:0 auto;padding:28px 18px 80px}
.fc{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:26px;margin-bottom:22px;position:relative}
.fc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),#f5c842,transparent)}
.sl2{font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.sl2::after{content:'';flex:1;height:1px;background:var(--border)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:480px){.r2{grid-template-columns:1fr}}
.fl{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:7px;font-weight:600}
.sw{position:relative}
.sw::after{content:'\25BE';position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);pointer-events:none}
select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:3px;padding:11px 34px 11px 13px;font-family:'Calibri','Carlito',sans-serif;font-size:14px;color:var(--text);outline:none;appearance:none;-webkit-appearance:none;transition:border-color .2s}
select:focus{border-color:var(--blue)}
select option,select optgroup{background:#14141f;color:var(--text)}
input[type=number]{width:100%;background:var(--card);border:1px solid var(--border);border-radius:3px;padding:11px 13px;font-family:'Calibri','Carlito',sans-serif;font-size:17px;font-weight:700;color:#fff;outline:none;transition:border-color .2s;-moz-appearance:textfield}
input[type=number]:focus{border-color:#f5c842}
input[type=number]::-webkit-inner-spin-button{display:none}
.fh{font-size:10px;margin-top:5px;min-height:13px;color:var(--muted)}
.fh.ok{color:#4ade80}.fh.warn{color:#f87171}
.kb{margin-top:7px;display:none}
.kbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px}
.kbr{height:3px;background:var(--border);overflow:hidden}
.kbf{height:100%;background:linear-gradient(90deg,var(--blue),#f5c842);transition:width .3s}
.eb{margin-bottom:14px;display:none}
.es{width:100%;background:#0e0b00;border:1px solid #5a4a00;border-radius:3px;padding:11px 34px 11px 13px;font-family:'Calibri','Carlito',sans-serif;font-size:14px;color:#f5c842;outline:none;appearance:none;-webkit-appearance:none}
.es option{background:#0e0c00;color:#f5c842}
.esw::after{color:#f5c842}
.sb{width:100%;background:var(--blue);border:none;border-radius:3px;padding:13px;font-family:'Calibri','Carlito',sans-serif;font-size:16px;font-weight:700;letter-spacing:.08em;color:#fff;cursor:pointer;text-transform:uppercase;transition:background .2s}
.sb:hover{background:var(--blue2)}
.sb:disabled{background:#0a1a2a;color:#1a3a5a;cursor:not-allowed}
.rw{animation:su .25s ease}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.rc{background:var(--panel);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.rh{padding:18px 22px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0c0b00,#0d1020);position:relative}
.rh::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.rb2{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.b{font-family:'Calibri','Carlito',sans-serif;font-size:10px;font-weight:700;padding:3px 9px;letter-spacing:.1em;border-radius:2px}
.b-tac{background:rgba(0,85,164,.25);color:#f5c842;border:1px solid rgba(0,85,164,.5)}
.b-up{background:rgba(245,200,66,.12);color:#f5c842;border:1px solid rgba(245,200,66,.4)}
.b-ram{background:rgba(255,255,255,.06);color:#fff;border:1px solid var(--border);font-size:15px;font-weight:900;padding:2px 11px}
.b-emp{background:rgba(245,200,66,.15);color:#f5c842;border:1px solid rgba(245,200,66,.5)}
.b-ok{font-size:10px;padding:3px 8px;background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.b-ap{font-size:10px;padding:3px 8px;background:rgba(245,200,66,.1);color:#f5c842;border:1px solid rgba(245,200,66,.3)}
.rkm{font-size:clamp(32px,7vw,48px);font-weight:900;color:#fff;line-height:1}
.rkm span{color:#f5c842;font-size:.5em;font-weight:700;vertical-align:middle;margin-left:6px}
.ren{font-size:12px;color:#f5c842;margin-top:5px}
.rb3{padding:18px 22px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
@media(max-width:480px){.dg{grid-template-columns:1fr}}
.dc{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:11px 13px}
.dc.full{grid-column:1/-1}
.dcl{font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;font-weight:600}
.dcv{font-size:15px;font-weight:700;color:#fff}
.dcv.co{font-size:13px;color:#a0c0ff;word-break:break-all}
.nb{border-radius:2px;padding:10px 13px;font-size:11px;line-height:1.7;margin-top:11px}
.nt{background:rgba(0,85,164,.08);border:1px solid rgba(0,85,164,.25);color:#80aaff}
.ne{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.25);color:#4ade80}
.nep{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.25);color:#f5c842}
.maplabel{font-size:13px;font-weight:600;color:var(--sky);padding:4px 0 6px;cursor:pointer;letter-spacing:.3px;}
.mbs{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px}
.mb{display:inline-flex;align-items:center;gap:6px;text-decoration:none;padding:10px 16px;border-radius:3px;font-family:'Calibri','Carlito',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:opacity .2s}
.mb:hover{opacity:.85}
.mb-m{background:#0a1e50;color:#a0c0ff;border:1px solid #1a4fa0;flex:1;justify-content:center}

.mb-e{background:#0a1a0a;color:#34c759;border:1px solid #1a6b30;flex:1;justify-content:center}
.ny{background:var(--card);border:1px solid #5a4a00;border-radius:2px;margin-top:11px;overflow:hidden}
.nyh{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#f5c842;padding:9px 13px;border-bottom:1px solid #5a4a00;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:8px 13px;border-bottom:1px solid #0d1f35;cursor:pointer;transition:background .15s}
.ni:last-child{border-bottom:none}
.ni:hover{background:rgba(0,85,164,.08)}
.nic{font-size:13px;font-weight:900;color:#f5c842;flex-shrink:0;min-width:52px}
.nin{font-size:11px;color:var(--text);flex:1;line-height:1.3}
.nid{font-size:10px;color:var(--muted);text-align:right;white-space:nowrap}
.rf{background:rgba(0,0,0,.25);border-top:1px solid var(--border);padding:8px 22px;display:flex;gap:10px;flex-wrap:wrap}
.ft{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px}
.fd{width:5px;height:5px;background:#4ade80;border-radius:50%}
.wm{position:fixed;bottom:14px;right:18px;font-family:'Calibri','Carlito',sans-serif;font-size:13px;font-weight:700;color:#FFD700;opacity:.75;pointer-events:none;z-index:998;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.city-near{font-size:11px;color:#c8a800;margin:7px 0 4px 0;padding:4px 8px;background:rgba(200,168,0,.08);border-left:2px solid #c8a800;border-radius:2px;letter-spacing:.3px}</style>
</head>

    var empInRange=(r.e||[]).filter(function(e){return e[0]>=entry.mn&&e[0]<=entry.mx;}).length;
    o.textContent=k+'  ·  km '+mn+'→'+mx+'  ('+npInRange+'pts'+(empInRange?' · '+empInRange+'emp':'')+')';
    og.appendChild(o);
  });

});


function parseVal(v) {
  var parts = v.split('|');
  return { rk: parts[0], upMn: parseFloat(parts[1]), upMx: parseFloat(parts[2]) };
}
function gR(){ var v=sel.value; if(!v) return null; var p=parseVal(v); return rk[p.rk]; }
function getRK(){ var v=sel.value; if(!v) return null; return parseVal(v).rk; }
function getRange(){ var v=sel.value; if(!v) return null; var p=parseVal(v); return {mn:p.upMn, mx:p.upMx}; }

function onR(){

function chk(){

function hav(a,b){
  var R=6371000,p=Math.PI/180;
  var dl=(b[0]-a[0])*p, dn=(b[1]-a[1])*p;
  var x=Math.sin(dl/2)*Math.sin(dl/2)+Math.cos(a[0]*p)*Math.cos(b[0]*p)*Math.sin(dn/2)*Math.sin(dn/2);
  return R*2*Math.asin(Math.sqrt(Math.max(0,Math.min(1,x))));
}

function cumD(s){
  var c=[0];
  for(var i=1;i<s.length;i++) c.push(c[c.length-1]+hav(s[i-1],s[i]));
  return c;
}

function iSeg(s,t){
  if(!s||s.length<2) return (s&&s[0])||[0,0];
  var cd=cumD(s), tot=cd[cd.length-1];
  if(tot===0) return s[0];
  var tg=Math.max(0,Math.min(tot,t*tot));
  var lo=0, hi=cd.length-1;
  while(lo<hi-1){var m=(lo+hi)>>1; if(cd[m]<=tg) lo=m; else hi=m;}
  if(cd[hi]===cd[lo]) return s[lo];
  var f=(tg-cd[lo])/(cd[hi]-cd[lo]);
  return [s[lo][0]+f*(s[hi][0]-s[lo][0]), s[lo][1]+f*(s[hi][1]-s[lo][1])];
}

function locate(rv,km){
  var d=DATA[rv]; if(!d) return null;
  var k=d.k, s=d.segs;
  for(var i=0;i<k.length;i++){
    if(k[i][0]===km) return {lat:k[i][1],lon:k[i][2],exacto:true,km:km,label:k[i][3],isEmp:k[i][4]===1,onTrace:s.length>0};
  }
  var ai=-1, bi=-1;
  for(var i=0;i<k.length-1;i++){
    var ka=k[i][0], kb=k[i+1][0];
    if((ka<=km&&km<=kb)||(kb<=km&&km<=ka)){ai=i; bi=i+1; break;}
  }
  if(ai===-1){
    var ci=0;
    for(var i=1;i<k.length;i++) if(Math.abs(k[i][0]-km)<Math.abs(k[ci][0]-km)) ci=i;
    return {lat:k[ci][1],lon:k[ci][2],exacto:false,km:km,solo:true,kmRef:k[ci][0],onTrace:false};
  }
  var a=k[ai], b=k[bi];
  var sp=b[0]-a[0], t=sp!==0?(km-a[0])/sp:0.5, tc=Math.max(0,Math.min(1,t));
  if(s&&s[ai]&&s[ai].length>=2){
    var c=iSeg(s[ai],tc);
    return {lat:c[0],lon:c[1],exacto:false,km:km,onTrace:true,
            ra:{km:a[0],n:a[3],e:a[4]===1}, rd:{km:b[0],n:b[3],e:b[4]===1},
            da:Math.abs(km-a[0]), dd:Math.abs(b[0]-km)};
  }
  return {lat:a[1]+tc*(b[1]-a[1]),lon:a[2]+tc*(b[2]-a[2]),
          exacto:false,km:km,onTrace:false,
          ra:{km:a[0],n:a[3],e:a[4]===1}, rd:{km:b[0],n:b[3],e:b[4]===1},
          da:Math.abs(km-a[0]), dd:Math.abs(b[0]-km)};
}

function near(rv,km){
  return (DATA[rv]&&DATA[rv].k||[])
    .filter(function(p){return p[4]===1&&Math.abs(p[0]-km)<=15;})
    .sort(function(a,b){return Math.abs(a[0]-km)-Math.abs(b[0]-km);})
    .slice(0,5);
}

function fmt(k){
  return k.toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:3});
}

      document.body.appendChild(kmlLink);
      kmlLink.click();
      setTimeout(function(){document.body.removeChild(kmlLink);},500);
    },400);

  } else if(isIOS){
    // iOS: download KML — GE app picks it up from Files
    var a=document.createElement('a');
    a.href=url;
    a.download='FCGB_'+label.replace(/[^a-zA-Z0-9]/g,'_')+'.kml';
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
    // Also try comgoogleearth scheme
    setTimeout(function(){
      window.location.href='comgoogleearth://?center='+la+','+lo+'&zoom=15';
    },200);

  } else {
    // Desktop: GE web with search pin
    window.open(
      'https://earth.google.com/web/search/'+la+','+lo
      +'/@'+la+','+lo+',500a,500d,35y,0h,45t,0r',
      '_blank'
    );
  }
}

function nearestCity(la,lo){
  var best=null,bestD=Infinity;
  for(var i=0;i<CITIES.length;i++){
    var c=CITIES[i];
    var p=Math.PI/180;
    var dl=(c[1]-la)*p,dn=(c[2]-lo)*p;
    var x=Math.sin(dl/2)*Math.sin(dl/2)+Math.cos(la*p)*Math.cos(c[1]*p)*Math.sin(dn/2)*Math.sin(dn/2);
    var d=6371*2*Math.asin(Math.sqrt(Math.min(1,x)));
    if(d<bestD){bestD=d;best=c;}
  }
  if(!best)return '';
  var dist=bestD<1?(Math.round(bestD*1000)+' m'):(Math.round(bestD*10)/10+' km');
  return '● a '+dist+' de '+best[0];
}
